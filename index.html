<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="px.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PX4T9 - 대한민국 KR</title>
    <!-- Use Helvetica or similar minimalistic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #d8b0ff; /* Purple color for the logo */
        }

        .menu-toggle {
            display: none;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            text-decoration: none;
            font-weight: 500;
            color: #fff;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #d8b0ff; /* Purple hover effect */
        }

        .hero {
            height: 100vh;
            background-image: url('background.jpg'); /* Placeholder for your background image */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 0 10%;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(50, 50, 120, 0.5));
            z-index: 1;
        }

        .hero-left {
            position: relative;
            z-index: 2;
            max-width: 40%;
        }

        .hero-left img {
            width: 100%;
            max-width: 350px;
        }

        .hero-right {
            position: relative;
            z-index: 2;
            max-width: 50%;
            text-align: left;
        }

        .hero-right h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .hero-right p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #d0d0d0;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn-download {
            background-color: #ffa500; /* Orange button for download */
            color: #000;
        }

        .btn-download:hover {
            background-color: #ff8c00;
            transform: scale(1.05);
        }

        .btn-documentation {
            background-color: #d8b0ff; /* Purple button for documentation */
            color: #fff;
        }

        .btn-documentation:hover {
            background-color: #b380ff;
            transform: scale(1.05);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav {
                padding: 20px;
            }

            .menu-toggle {
                display: block;
            }

            nav ul {
                display: none;
                flex-direction: column;
                gap: 10px;
                background-color: rgba(0, 0, 0, 0.9);
                position: absolute;
                top: 70px;
                right: 20px;
                padding: 15px;
                border-radius: 10px;
            }

            nav ul.active {
                display: flex;
            }

            .hero {
                flex-direction: column;
                padding: 20px;
                text-align: center;
            }

            .hero-left,
            .hero-right {
                max-width: 100%;
                width: 100%;
                margin-bottom: 40px;
            }

            .hero-right h1 {
                font-size: 36px;
            }

            .hero-right p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PX4T9</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="menu">
            <li><a href="index.html">홈</a></li>
            <li><a href="annc.html">공지사항</a></li>
            <li><a href="info.html">질문</a></li>
            <li><a href="terms.html">이용약관</a></li>
            <li><a href="license.html">라이선스</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-left">
            <img src="px.ico" alt="PX4T9 Logo">
        </div>
        <div class="hero-right">
            <h1>최고의 오픈소스 모의해킹 툴</h1>
            <p>PX4T9는 여러분의 학습과 연구를 위해 만들어졌습니다. 프로그램을 이해하고 방어할 수 있도록 소스코드도 함께 제공됩니다. 안전하게 사용할 수 있는 가상 환경에서 사용해 주시기 바랍니다.</p>
            <div class="hero-buttons">
                <a href="download.html" class="btn btn-documentation">다운로드</a>
            </div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>
