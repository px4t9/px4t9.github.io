<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PX4T9</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1f1a2e;
            color: #d3d0e1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            text-align: center;
        }

        .content {
            max-width: 90%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 3s forwards, fadeOut 2s 5s forwards;
            opacity: 0;
        }

        .content img {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
        }

        .content p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 auto 15px;
        }

        .footer {
            margin-top: 20px;
            animation: fadeIn 3s forwards, fadeOut 2s 5s forwards; /* 애니메이션 수정 */
            opacity: 0; /* 초기값 설정 */
        }

        .footer .ratings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Space between each icon */
            margin-bottom: 10px;
        }

        .footer .ratings img {
            width: 50px; /* Footer icon size */
            height: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        @media screen and (max-width: 768px) {
            .content {
                padding: 15px;
            }

            .footer .ratings img {
                width: 40px; /* Smaller size for mobile */
            }

            .content p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="harm.png" alt="14+">
        <p>
            해당 툴의 오용으로 발생한 모든 피해는 사용자 본인의 책임이며, PX4T9 제작진은 이에 대해 책임을 지지 않습니다.
            <br><br>
            All damages caused by misuse of this tool are solely the user's responsibility, and PX4T9 developers accept no liability.
        </p>
    </div>

    <script>
        // Redirect to main.html after fade out
        setTimeout(() => {
            window.location.href = 'main.html';
        }, 8000); // Redirect after 8 seconds
    </script>
</body>
</html>
