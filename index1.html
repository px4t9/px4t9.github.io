<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점검중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2e004f; /* 다크 퍼플 배경색 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(145deg, #3a005c, #240036);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), inset 0 -3px 5px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: #bb86fc; /* 밝은 퍼플 텍스트 */
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #e0c3fc;
            line-height: 1.5;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            font-size: 1.2rem;
            margin: 10px 0;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: background-color 0.3s ease;
        }

        li:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1.1rem;
            }

            li {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>점검중 입니다.</h1>
        <p>2025년 1월 16일 - 2025년 2월 16일</p>
        <h2 style="font-size: 1.5rem; margin-bottom: 20px; color: #d1a3ff;">점검 내역:</h2>
        <ul>
            <li>서비스 안정화</li>
            <li>툴 점검</li>
        </ul>
    </div>
</body>
</html>
