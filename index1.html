<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PX4T9 - 점검중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1f1a2e;
            color: #d3d0e1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .content {
            max-width: 90%;
            padding: 20px;
            box-sizing: border-box;
        }

        .content img {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
        }

        .content h1 {
            font-size: 1.5rem;
            color: #bb86fc;
            margin: 15px 0;
        }

        .content p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 10px;
            color: #e0c3fc;
        }

        ul {
            list-style: disc;
            padding: 0;
            margin: 0 auto;
            display: inline-block; /* 블릿포인트를 가운데 정렬 */
            text-align: left; /* 블릿포인트는 왼쪽 정렬 */
        }

        ul li {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 5px;
            color: #e0c3fc;
        }

        @media (max-width: 768px) {
            .content img {
                width: 120px;
            }

            .content h1 {
                font-size: 1.2rem;
            }

            .content p {
                font-size: 0.9rem;
            }

            ul li {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="maintenance.png" alt="Maintenance Icon">
        <h2>점검중 입니다.</h2>
		<h4>이용에 불편을 드려 죄송합니다.</h4>
        <h5>2025년 1월 16일 - 2025년 2월 16일</h5>
    </div>
</body>
</html>
